services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wtrlab
      POSTGRES_USER: wtrlab
      POSTGRES_PASSWORD: wtrlab_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wtrlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: wtrlab
      DB_NAME: wtrlab
      DB_SSLMODE: disable
      SERVER_PORT: "8080"
      FRONTEND_URL: http://localhost:3000
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/en/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db-backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: wtrlab
      DB_NAME: wtrlab
      DB_PASSWORD: wtrlab_secret
      BACKUP_DIR: /backups
      RETENTION_DAYS: "7"
    volumes:
      - ./scripts/db-backup.sh:/usr/local/bin/db-backup.sh:ro
      - pgbackups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache postgresql-client && exec db-backup.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgbackups:
