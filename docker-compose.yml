services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wtrlab
      POSTGRES_USER: wtrlab
      POSTGRES_PASSWORD: wtrlab_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wtrlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: wtrlab
      DB_PASSWORD: wtrlab_secret
      DB_NAME: wtrlab
      DB_SSLMODE: disable
      JWT_SECRET: dev-jwt-secret-change-in-production
      SERVER_PORT: "8080"
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
