services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wtrlab
      POSTGRES_USER: wtrlab
      POSTGRES_PASSWORD: wtrlab_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wtrlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"  # For development only; production traffic goes through Caddy
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: wtrlab
      DB_NAME: wtrlab
      DB_SSLMODE: disable
      SERVER_PORT: "8080"
      APP_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8080
    ports:
      - "3000:3000"  # For development only; production traffic goes through Caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  db-backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: wtrlab
      DB_NAME: wtrlab
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_DIR: /backups
      RETENTION_DAYS: "7"
    volumes:
      - ./scripts/db-backup.sh:/usr/local/bin/db-backup.sh:ro
      - pgbackups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec db-backup.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgbackups:
  caddy_data:
  caddy_config: